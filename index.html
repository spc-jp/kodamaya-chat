<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弁護士に聞いてみっけ｜こだまや法律事務所</title>
  <meta property="og:title" content="弁護士に聞いてみっけ" />
  <meta property="og:description" content="法律のこと、まずここで気軽に聞いてみてください。弁護士アシスタントi（あい）がお答えします。" />
  <meta property="og:url" content="https://spc-jp.github.io/kodamaya-chat/" />
  <meta property="og:image" content="" />
  <link rel="icon" type="image/png" href="https://spc-jp.github.io/kodamaya-chat/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --main: #1A7FA8;
      --accent: #0E9DC5;
      --yellow: #FFE066;
      --bg: #EBF7FC;
      --text: #0D3D52;
      --subtext: #2E7A96;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text);
    }
    header { width: 100%; max-width: 640px; padding: 0 0 12px; text-align: center; }
    .hero {
      width: 100%;
      background: linear-gradient(160deg, #7DD4ED 0%, #B8E8F5 50%, #E8F7FC 100%);
      padding: 28px 16px 22px;
      text-align: center;
    }
    .hero h1 { font-size: 1.6rem; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
    .hero h1 span { color: var(--main); }
    .hero p.subtitle { font-size: 0.95rem; color: var(--subtext); margin-top: 5px; }
    .hero p.office {
      display: inline-block;
      font-size: 0.82rem;
      color: var(--main);
      font-weight: 700;
      margin-top: 8px;
      background: rgba(255,255,255,0.7);
      padding: 3px 12px;
      border-radius: 20px;
      border: 1px solid rgba(26,127,168,0.25);
    }
    #chat-wrapper {
      width: 100%;
      max-width: 640px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 12px;
      padding-bottom: 90px;
    }
    #messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      padding: 16px 0 16px;
    }
    .bubble-row { display: flex; align-items: flex-end; gap: 8px; }
    .bubble-row.user { flex-direction: row-reverse; }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; background: var(--bg);
      border: 2px solid var(--yellow); overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar.ai-avatar { animation: float 3s ease-in-out infinite; }
    .avatar.ai-avatar.thinking { animation: shake 0.4s ease-in-out infinite; }
    .avatar.ai-avatar.enter { animation: fadeInDown 0.6s ease forwards; }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0px); }
      25% { transform: translateX(-2px); }
      75% { transform: translateX(2px); }
    }
    @keyframes fadeInDown {
      0% { opacity: 0; transform: translateY(-12px); }
      100% { opacity: 1; transform: translateY(0px); }
    }
    .bubble-row.user .avatar { background: var(--accent); border-color: var(--accent); }
    .bubble {
      max-width: 78%; padding: 11px 15px; border-radius: 18px;
      font-size: 1.0rem; line-height: 1.8;
      white-space: pre-wrap; word-break: break-word;
      transition: box-shadow 0.2s;
    }
    .bubble.ai {
      background: #FFFFFF;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(26,127,168,0.10);
      border-left: 3px solid var(--yellow);
      color: var(--text);
    }
    .bubble.ai:hover {
      box-shadow: 0 4px 16px rgba(26,127,168,0.18);
      border-left-color: var(--accent);
    }
    .bubble.user {
      background: linear-gradient(135deg, var(--accent) 0%, var(--main) 100%);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 8px rgba(14,157,197,0.20);
    }
    .bubble-name { font-size: 0.78rem; color: var(--subtext); margin-bottom: 3px; padding-left: 4px; }

    .example-label {
      font-size: 0.82rem;
      color: var(--subtext);
      margin: 4px 0 6px 46px;
    }
    .example-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-left: 46px;
      margin-bottom: 4px;
    }
    .example-btn {
      display: inline-block;
      background: #fff;
      border: 1.5px solid var(--accent);
      color: var(--main);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.95rem;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      text-align: left;
      transition: background 0.18s, color 0.18s, transform 0.12s;
    }
    .example-btn:hover { background: var(--accent); color: #fff; transform: translateY(-1px); }

    .theme-label {
      font-size: 0.72rem;
      color: var(--subtext);
      margin: 8px 0 6px 0;
      text-align: center;
    }
    .theme-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }
    .theme-btn {
      background: #fff;
      border: 1.5px solid var(--main);
      color: var(--main);
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 0.95rem;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, transform 0.12s;
      font-weight: 500;
    }
    .theme-btn:hover { background: var(--main); color: #fff; transform: translateY(-1px); }

    #input-area {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; justify-content: center;
      background: rgba(235,247,252,0.96);
      backdrop-filter: blur(10px);
      border-top: 2px solid var(--yellow);
      padding: 10px 12px 16px;
    }
    #input-inner { width: 100%; max-width: 640px; display: flex; gap: 8px; align-items: flex-end; }
    #user-input {
      flex: 1; resize: none;
      border: 1.5px solid rgba(26,127,168,0.3);
      border-radius: 14px; padding: 11px 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 1.0rem; color: var(--text);
      background: #fff; outline: none;
      max-height: 120px; line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #user-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14,157,197,0.12); }
    #send-btn {
      flex-shrink: 0; width: 46px; height: 46px;
      border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--accent), var(--main));
      color: #fff; font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 3px 10px rgba(14,157,197,0.35);
    }
    #send-btn:hover { transform: scale(1.07); box-shadow: 0 5px 16px rgba(14,157,197,0.45); }
    #send-btn:active { transform: scale(0.93); }
    #send-btn:disabled { background: #b0c9d4; box-shadow: none; cursor: not-allowed; }
    .contact-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .contact-btn {
      display: block; text-align: center; text-decoration: none;
      padding: 11px 16px; border-radius: 10px;
      font-size: 0.88rem; font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      transition: opacity 0.2s, transform 0.15s;
    }
    .contact-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .contact-btn.tel {
      background: linear-gradient(135deg, var(--accent), var(--main));
      color: #fff; box-shadow: 0 2px 8px rgba(14,157,197,0.25);
    }
    .contact-btn.form {
      background: #fff; color: var(--main); border: 2px solid var(--main);
    }
    .typing-dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent);
      margin: 0 2px; animation: blink 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>
<header>
  <div class="hero">
    <h1>&#9878;&#65039; <span>弁護士に聞いてみっけ</span></h1>
    <p class="subtitle">法律のこと、まずここで気軽に聞いてみて</p>
    <p class="office">こだまや法律事務所</p>
  </div>
</header>

<div id="chat-wrapper">
  <div id="messages"></div>
</div>

<div id="input-area">
  <div id="input-inner">
    <textarea id="user-input" rows="1" placeholder="ここに質問を入力してください..."></textarea>
    <button id="send-btn" title="送信">&#9654;</button>
  </div>
</div>

<script>
  const WORKER_URL = "https://kodamaya-chat.yymmatsu.workers.dev";

  const SYSTEM_PROMPT = `あなたは「i（あい）」という名前の弁護士アシスタントです。
こだまや法律事務所のサポートスタッフとして、法律のことで困っている方に寄り添いながら、わかりやすく情報をお伝えするのがお仕事です。

あなたの役割は「法律の専門的な判断をすること」ではありません。
「こだまや法律事務所に相談してみようかな」と思っていただけるよう、やさしく背中を押すことです。

回答するときは次のことを必ず守ってください。
難しい言葉は使わず、友達に話しかけるようなやさしい言葉を選んでください。
法律論・法的判断・条文の解説は一切行わないでください。
200文字以内でコンパクトにまとめてください。
自分は弁護士ではなくAIアシスタントであることを忘れずに、謙虚な姿勢で接してください。
自分のことは「i（あい）」と名乗り、明るくて親しみやすい雰囲気を大切にしてください。
回答には「**」「##」「###」「- 」「* 」などのマークダウン記号は一切使わないでください。記号なしの自然な日本語だけで答えてください。

【相談できる内容について】
「こんな相談をしてもいいのか？」と聞かれたら、「だいたいの相談は大丈夫ですよ。まずは気軽に話してみてください」とお伝えしてください。
弁護士以外の専門家が適切な場合は、やさしく案内してください。
登記のことは「それは司法書士の先生が得意な分野ですよ」と案内してください。
確定申告・税金のことは「それは税理士の先生に相談するとスムーズですよ」と案内してください。
交通違反・行政手続きのことは「行政書士の先生が詳しいですよ」と案内してください。

【相談方法について】
電話やウェブでの相談について聞かれたら、「基本的には面談でのご相談をお願いしています。直接お会いしてお話しすることで、より正確にお力になれますよ」とお伝えしてください。

【費用について】
法律相談料について聞かれたら、以下をやさしくお伝えしてください。
初回の法律相談は30分5,500円（税込）です。
多くの場合、1時間半以内で終わることが多いです。
「30分だけで終わらせたい」というご希望にも、できるだけ合わせてもらえます。
具体的な費用の見積もりは、面談相談のあとに作成してもらえます。

【こだまや法律事務所が対応できる主な分野】
以下の分野について「対応できますか？」と聞かれたら、「はい、対応していますよ」とやさしくお答えしてください。

法律相談全般
30分5,500円（税込）から。A4用紙3枚程度までの定型的な契約書のリスク判断も含みます。

内容証明郵便の作成
簡単なもので3万円から。複雑な内容はご相談ください。

契約書のリスク確認・作成
定型的な売買・賃貸借・請負などの契約書は5万円から。

離婚・男女問題
協議・調停・訴訟に対応。着手金30万円から。財産分与・慰謝料・養育費・親権・面会交流なども対応。

相続・遺言
遺産分割・遺言無効・遺留分侵害請求・遺言作成・遺言執行・相続放棄など幅広く対応。遺言作成は相続財産300万円未満で10万円から。

債務整理・借金問題
個人自己破産・個人再生・任意整理・過払い金回収に対応。自己破産（同時廃止）は債権者5社まで20万円から。

交通事故
示談交渉・調停・訴訟に対応。

不動産トラブル
所有権確認・借地・借家・境界問題など。

企業法務・契約トラブル
顧問契約・契約書作成・交渉・訴訟に対応。顧問料は月3万円から。

刑事事件
起訴前・起訴後の弁護に対応。

成年後見・任意後見
後見開始申立・任意後見契約・財産管理・見守りサービスに対応。

その他
所在確認調査・死後事務委任なども対応しています。

【答えられない内容】
具体的な法的判断・勝訴見込み・示談金の金額・時効の計算など、個別の法律判断が必要な質問には答えず、「その点については、直接ご相談いただくと正確にお答えできますよ」とやさしく伝えてください。
`;

  const BRIDGE_1 = "他にお知りになりたいことはございますか？どんな小さなことでも、気軽に聞いてくださいね。";
  const BRIDGE_2 = "まだ気になることがあれば、遠慮なく聞いてください。i（あい）がしっかりお答えします。";
  const BRIDGE_3 = "今日のお話、もう少し具体的に弁護士に相談してみませんか？こだまや法律事務所では、はじめての方でも安心してご相談いただけますよ。";

  const EXAMPLES = [
    "💬 離婚したいけど何から始めればいいですか？",
    "💬 親が亡くなって遺産のことで揉めています",
    "💬 借金が返せなくなってきました",
    "💬 職場でハラスメントを受けています",
    "💬 交通事故に遭ったらどうすればいいですか？"
  ];

  const THEMES = [
    { label: "📝 相続・遺言", question: "相続や遺言について基本的なことを教えてください" },
    { label: "💔 離婚・男女問題", question: "離婚についての基本的な流れを教えてください" },
    { label: "💰 借金・債務整理", question: "借金の返済が難しくなった場合の選択肢を教えてください" },
    { label: "🏢 企業・契約トラブル", question: "企業間のトラブルや契約問題について教えてください" },
    { label: "🚗 交通事故", question: "交通事故に遭ったときの対応について教えてください" },
    { label: "🏠 不動産トラブル", question: "不動産に関するトラブルについて教えてください" }
  ];

  const MAX_FREE = 3;
  const STORAGE_KEY = "kodamaya_use_count_v4";

  // 古いバージョンのキーを自動削除
  ["kodamaya_use_count", "kodamaya_use_count_v2", "kodamaya_use_count_v3"].forEach(k => localStorage.removeItem(k));

  let messages = [];
  let useCount = parseInt(localStorage.getItem(STORAGE_KEY) || "0", 10);

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");

  function init() {
    addBubble("ai",
      "こんにちは！弁護士アシスタントのi（あい）です。\n\n" +
      "法律のことって、なんだか難しそうで相談しにくいですよね。\n" +
      "でも大丈夫！どんな小さなことでも、気軽に聞いてみてください。"
    );
    if (useCount >= MAX_FREE) {
      showLimitBubble();
      disableInput();
    } else {
      addExampleButtons();
    }
  }

  function addExampleButtons() {
    const wrap = document.createElement("div");
    const label = document.createElement("div");
    label.className = "example-label";
    label.textContent = "例えばこんなことを聞いてみてください";
    wrap.appendChild(label);
    const btnArea = document.createElement("div");
    btnArea.className = "example-buttons";
    btnArea.id = "example-buttons";
    EXAMPLES.forEach(text => {
      const btn = document.createElement("button");
      btn.className = "example-btn";
      btn.textContent = text;
      btn.addEventListener("click", () => {
        removeExampleButtons();
        const clean = text.replace("💬 ", "");
        inputEl.value = clean;
        sendMessage();
      });
      btnArea.appendChild(btn);
    });
    wrap.appendChild(btnArea);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function removeExampleButtons() {
    const el = document.getElementById("example-buttons");
    if (el && el.parentNode) el.parentNode.remove();
  }

  function addThemeButtons() {
    const wrap = document.createElement("div");
    wrap.id = "theme-buttons-wrap";
    wrap.style.cssText = "margin-top:8px;";

    const label = document.createElement("div");
    label.className = "theme-label";
    label.textContent = "他のテーマについても聞いてみませんか？";
    wrap.appendChild(label);

    const btnArea = document.createElement("div");
    btnArea.className = "theme-buttons";

    THEMES.forEach(theme => {
      const btn = document.createElement("button");
      btn.className = "theme-btn";
      btn.textContent = theme.label;
      btn.addEventListener("click", () => {
        removeThemeButtons();
        useCount = 0;
        localStorage.setItem(STORAGE_KEY, "0");
        messages = [];
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.placeholder = "ここに質問を入力してください...";
        inputEl.value = theme.question;
        sendMessage();
      });
      btnArea.appendChild(btn);
    });

    wrap.appendChild(btnArea);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function removeThemeButtons() {
    const el = document.getElementById("theme-buttons-wrap");
    if (el) el.remove();
  }

  function createAiWrap() {
    const wrap = document.createElement("div");
    wrap.style.cssText = "display:flex;flex-direction:column;align-items:flex-start;";
    const name = document.createElement("div");
    name.className = "bubble-name";
    name.textContent = "i（あい）";
    wrap.appendChild(name);
    const row = document.createElement("div");
    row.className = "bubble-row ai";
    const avatar = document.createElement("div");
    avatar.className = "avatar ai-avatar enter";
    const img = document.createElement("img");
    img.src = "ai-avatar.png";
    img.alt = "i（あい）";
    avatar.appendChild(img);
    row.appendChild(avatar);
    wrap.appendChild(row);
    return { wrap, row };
  }

  function addBubble(role, text) {
    let row, wrap;
    if (role === "ai") {
      const created = createAiWrap();
      wrap = created.wrap;
      row = created.row;
    } else {
      wrap = document.createElement("div");
      wrap.style.cssText = "display:flex;flex-direction:column;align-items:flex-end;";
      row = document.createElement("div");
      row.className = "bubble-row user";
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = "👤";
      row.appendChild(avatar);
      wrap.appendChild(row);
    }
    const bubble = document.createElement("div");
    bubble.className = "bubble " + role;
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  function addLoadingBubble() {
    const { wrap, row } = createAiWrap();
    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    const thinkingAvatar = row.querySelector('.avatar');
    if (thinkingAvatar) thinkingAvatar.classList.add('thinking');
    row.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  function showLimitBubble() {
    const { wrap, row } = createAiWrap();
    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    bubble.innerHTML =
      "引き続きのご相談は、こだまや法律事務所へお気軽にどうぞ。" +
      '<div class="contact-buttons">' +
        '<a class="contact-btn tel" href="tel:042-975-1000">&#128222; 電話で相談する：042-975-1000</a>' +
        '<a class="contact-btn form" href="https://kodamaya-info.ssl-xserver.jp/script/mailform/file/" target="_blank" rel="noopener">&#9993; お問合せフォームはこちら</a>' +
      "</div>";
    row.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
    setTimeout(() => addThemeButtons(), 600);
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function disableInput() {
    inputEl.disabled = true;
    sendBtn.disabled = true;
    inputEl.placeholder = "ご相談はこだまや法律事務所へどうぞ";
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    if (useCount >= MAX_FREE) {
      showLimitBubble();
      disableInput();
      return;
    }

    removeExampleButtons();
    addBubble("user", text);
    inputEl.value = "";
    autoResize();
    sendBtn.disabled = true;

    messages.push({ role: "user", content: text });

    const loadingBubble = addLoadingBubble();

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages, system: SYSTEM_PROMPT })
      });

      if (!res.ok) throw new Error("HTTP " + res.status);

      const data = await res.json();
      const aiReply = data?.content?.[0]?.text || "回答を取得できませんでした。";

      useCount++;
      localStorage.setItem(STORAGE_KEY, String(useCount));

      let bridge = "";
      if (useCount === 1) bridge = "\n\n" + BRIDGE_1;
      else if (useCount === 2) bridge = "\n\n" + BRIDGE_2;
      else if (useCount === 3) bridge = "\n\n" + BRIDGE_3;

      loadingBubble.innerHTML = "";
      loadingBubble.textContent = aiReply + bridge;
      const tAvatar = loadingBubble.closest('.bubble-row')?.querySelector('.avatar');
      if (tAvatar) tAvatar.classList.remove('thinking');
      messages.push({ role: "assistant", content: aiReply });

      if (useCount >= MAX_FREE) {
        disableInput();
        setTimeout(() => showLimitBubble(), 800);
      }
    } catch (e) {
      loadingBubble.innerHTML = "";
      loadingBubble.textContent = "一時的にエラーが発生しました。少し待ってからもう一度お試しください。";
      const eAvatar = loadingBubble.closest('.bubble-row')?.querySelector('.avatar');
      if (eAvatar) eAvatar.classList.remove('thinking');
    } finally {
      if (useCount < MAX_FREE) sendBtn.disabled = false;
      scrollBottom();
    }
  }

  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  }

  sendBtn.addEventListener("click", sendMessage);
  inputEl.addEventListener("input", autoResize);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  init();
</script>
</body>
</html>
