<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弁護士に聞いてみっけ｜こだまや法律事務所</title>

  <!-- OGP -->
  <meta property="og:title" content="弁護士に聞いてみっけ" />
  <meta property="og:description" content="法律のこと、まずここで気軽に聞いてみてください。こだまや法律事務所のAIアシスタントです。" />
  <meta property="og:image" content="" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(160deg, #B8DDD8 0%, #EBF7FC 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #0D3D52;
    }

    /* ヘッダー */
    header {
      width: 100%;
      max-width: 640px;
      padding: 20px 16px 12px;
      text-align: center;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1A7FA8;
      letter-spacing: 0.02em;
    }
    header p.subtitle {
      font-size: 0.8rem;
      color: #0D3D52;
      opacity: 0.75;
      margin-top: 4px;
    }
    header p.office {
      font-size: 0.72rem;
      color: #1A7FA8;
      margin-top: 2px;
      font-weight: 500;
    }

    /* チャットラッパー */
    #chat-wrapper {
      width: 100%;
      max-width: 640px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 12px;
      padding-bottom: 80px; /* 入力欄分の余白 */
    }

    /* メッセージエリア */
    #messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding: 8px 0 16px;
    }

    /* 吹き出し共通 */
    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .bubble-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      background: #1A7FA8;
      color: #fff;
    }
    .bubble-row.user .avatar { background: #0E9DC5; }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.88rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.ai {
      background: #FFFFFF;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .bubble.user {
      background: #D4EDE9;
      border-bottom-right-radius: 4px;
    }

    /* 入力欄 */
    #input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      background: rgba(235, 247, 252, 0.92);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(26,127,168,0.15);
      padding: 10px 12px 14px;
    }
    #input-inner {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      resize: none;
      border: 1.5px solid #B8DDD8;
      border-radius: 12px;
      padding: 10px 12px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      color: #0D3D52;
      background: #fff;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: #1A7FA8; }
    #send-btn {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #0E9DC5;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    #send-btn:hover { background: #1A7FA8; }
    #send-btn:active { transform: scale(0.93); }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }

    /* 残り回数バッジ */
    #remaining-badge {
      text-align: center;
      font-size: 0.72rem;
      color: #1A7FA8;
      padding-bottom: 4px;
    }
  </style>
</head>
<body>

<header>
  <h1>⚖️ 弁護士に聞いてみっけ</h1>
  <p class="subtitle">法律のこと、まずここで聞いてみて</p>
  <p class="office">こだまや法律事務所</p>
</header>

<div id="chat-wrapper">
  <div id="messages"></div>
</div>

<div id="input-area">
  <div id="input-inner">
    <div style="flex:1; display:flex; flex-direction:column; gap:4px;">
      <div id="remaining-badge"></div>
      <textarea id="user-input" rows="1" placeholder="ここに質問を入力してください…"></textarea>
    </div>
    <button id="send-btn" title="送信">&#9654;</button>
  </div>
</div>

<script>
  // ===== 設定定数 =====
  const WORKER_URL = "https://kodamaya-chat.yymmatsu.workers.dev";

  const SYSTEM_PROMPT = `
あなたはこだまや法律事務所のAIアシスタントです。
法律に関する一般的な情報をわかりやすくお伝えします。
相続・遺言・離婚・債務整理・交通事故・不動産トラブル・企業法務など幅広い相談に対応します。

回答は必ず以下のルールを守ってください。
・やさしい言葉で、専門用語はできるだけ避ける
・200文字以内でコンパクトに答える
・必ず最後に「詳しくはこだまや法律事務所にご相談ください」と添える
・個別の法律判断や具体的なアドバイスは行わず、一般的な情報提供にとどめる
・私は弁護士ではなくAIアシスタントであることを常に意識する
`;

  const MAX_FREE = 3;
  const STORAGE_KEY = "kodamaya_use_count";

  // ===== 状態管理 =====
  let messages = []; // { role, content }[]
  let useCount = parseInt(localStorage.getItem(STORAGE_KEY) || "0", 10);

  // ===== DOM =====
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");
  const badgeEl    = document.getElementById("remaining-badge");

  // ===== 初期化 =====
  function init() {
    updateBadge();
    addBubble("ai",
      "こんにちは！こだまや法律事務所のAIアシスタントです😊\n\n" +
      "法律のことで気になることがあれば、なんでも気軽に聞いてください。\n\n" +
      "まずは無料で3回ご質問いただけます。"
    );
    if (useCount >= MAX_FREE) disableInput();
  }

  // ===== 吹き出し追加 =====
  function addBubble(role, text) {
    const row = document.createElement("div");
    row.className = "bubble-row " + role;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "ai" ? "⚖️" : "👤";

    const bubble = document.createElement("div");
    bubble.className = "bubble " + role;
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return bubble;
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ===== 残り回数バッジ =====
  function updateBadge() {
    const remaining = Math.max(0, MAX_FREE - useCount);
    if (remaining > 0) {
      badgeEl.textContent = `無料残り ${remaining} 回`;
    } else {
      badgeEl.textContent = "無料回数を使い切りました";
    }
  }

  // ===== 入力無効化 =====
  function disableInput() {
    inputEl.disabled = true;
    sendBtn.disabled = true;
    inputEl.placeholder = "無料回数を使い切りました";
  }

  // ===== 送信処理 =====
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    if (useCount >= MAX_FREE) {
      addBubble("ai",
        "無料相談の回数（3回）を使い切りました。\n\n" +
        "引き続きご相談はこだまや法律事務所へお気軽にどうぞ。\n\n" +
        "【こだまや法律事務所】"
      );
      disableInput();
      return;
    }

    // ユーザー吹き出し
    addBubble("user", text);
    inputEl.value = "";
    autoResize();
    sendBtn.disabled = true;

    // 履歴に追加
    messages.push({ role: "user", content: text });

    // ローディング
    const loadingBubble = addBubble("ai", "考え中...");

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages, system: SYSTEM_PROMPT })
      });

      if (!res.ok) throw new Error("HTTP " + res.status);

      const data = await res.json();
      const reply = data?.content?.[0]?.text || "回答を取得できませんでした。";

      loadingBubble.textContent = reply;
      messages.push({ role: "assistant", content: reply });

      // 使用回数インクリメント
      useCount++;
      localStorage.setItem(STORAGE_KEY, String(useCount));
      updateBadge();

      if (useCount >= MAX_FREE) {
        disableInput();
        setTimeout(() => {
          addBubble("ai",
            "無料相談の回数（3回）を使い切りました。\n\n" +
            "引き続きご相談はこだまや法律事務所へお気軽にどうぞ。\n\n" +
            "【こだまや法律事務所】"
          );
        }, 400);
      }
    } catch (e) {
      loadingBubble.textContent = "一時的にエラーが発生しました。少し待ってからもう一度お試しください。";
    } finally {
      if (useCount < MAX_FREE) sendBtn.disabled = false;
      scrollBottom();
    }
  }

  // ===== テキストエリア自動リサイズ =====
  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  }

  // ===== イベント =====
  sendBtn.addEventListener("click", sendMessage);
  inputEl.addEventListener("input", autoResize);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  init();
</script>
</body>
</html>
