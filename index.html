<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弁護士に聞いてみっけ｜こだまや法律事務所</title>

  <meta property="og:title" content="弁護士に聞いてみっけ" />
  <meta property="og:description" content="法律のこと、まずここで気軽に聞いてみてください。弁護士アシスタントi（アイ）がお答えします。" />
  <meta property="og:url" content="https://spc-jp.github.io/kodamaya-chat/" />
  <meta property="og:image" content="" />

  <link rel="icon" type="image/png" href="ai-avatar.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(160deg, #B8DDD8 0%, #EBF7FC 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #0D3D52;
    }

    header {
      width: 100%;
      max-width: 640px;
      padding: 20px 16px 12px;
      text-align: center;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1A7FA8;
      letter-spacing: 0.02em;
    }
    header p.subtitle {
      font-size: 0.8rem;
      color: #0D3D52;
      opacity: 0.75;
      margin-top: 4px;
    }
    header p.office {
      font-size: 0.72rem;
      color: #1A7FA8;
      margin-top: 2px;
      font-weight: 500;
    }

    #chat-wrapper {
      width: 100%;
      max-width: 640px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 12px;
      padding-bottom: 80px;
    }

    #messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding: 8px 0 16px;
    }

    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .bubble-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      background: #EBF7FC;
      color: #fff;
      overflow: hidden;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .bubble-row.user .avatar { background: #0E9DC5; }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.88rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.ai {
      background: #FFFFFF;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .bubble.user {
      background: #D4EDE9;
      border-bottom-right-radius: 4px;
    }

    #input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      background: rgba(235, 247, 252, 0.92);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(26,127,168,0.15);
      padding: 10px 12px 14px;
    }
    #input-inner {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      resize: none;
      border: 1.5px solid #B8DDD8;
      border-radius: 12px;
      padding: 10px 12px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      color: #0D3D52;
      background: #fff;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: #1A7FA8; }
    #send-btn {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #0E9DC5;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    #send-btn:hover { background: #1A7FA8; }
    #send-btn:active { transform: scale(0.93); }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }

    .contact-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }
    .contact-btn {
      display: block;
      text-align: center;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      transition: opacity 0.2s;
    }
    .contact-btn:hover { opacity: 0.85; }
    .contact-btn.tel { background: #0E9DC5; color: #fff; }
    .contact-btn.form { background: #1A7FA8; color: #fff; }
  </style>
</head>
<body>

<header>
  <h1>⚖️ 弁護士に聞いてみっけ</h1>
  <p class="subtitle">法律のこと、まずここで聞いてみて</p>
  <p class="office">こだまや法律事務所</p>
</header>

<div id="chat-wrapper">
  <div id="messages"></div>
</div>

<div id="input-area">
  <div id="input-inner">
    <textarea id="user-input" rows="1" placeholder="ここに質問を入力してください…"></textarea>
    <button id="send-btn" title="送信">&#9654;</button>
  </div>
</div>

<script>
  const WORKER_URL = "https://kodamaya-chat.yymmatsu.workers.dev";

  const SYSTEM_PROMPT = `
あなたは「i（アイ）」という名前の弁護士アシスタントです。
こだまや法律事務所のサポートスタッフとして、法律のことで困っている方に寄り添いながら、わかりやすく情報をお伝えするのがお仕事です。

相続や遺言、離婚、債務整理、交通事故、不動産のトラブル、企業法務など、どんなご相談でも丁寧にお答えします。

回答するときは、次のことを大切にしてください。

難しい言葉は使わず、友達に話しかけるようなやさしい言葉を選んでください。
200文字以内でコンパクトにまとめてください。
個別の法律判断や具体的なアドバイスはせず、あくまで一般的な情報をお伝えするにとどめてください。
自分は弁護士ではなくAIアシスタントであることを忘れずに、謙虚な姿勢で接してください。
自分のことは「i（アイ）」と名乗り、明るくて親しみやすい雰囲気を大切にしてください。

回答の最後には、会話の回数に応じて次のように自然につなげてください。
1回目と2回目の回答では「他にも気になることがあれば、気軽に聞いてくださいね」という雰囲気で会話を続けてください。
3回目の回答では「今日お話しした内容について、もう少し具体的にご相談されてみませんか？こだまや法律事務所では、はじめての方でも安心してご相談いただけますよ」という形で自然に事務所への橋渡しをしてください。
`;

  const MAX_FREE = 3;
  const STORAGE_KEY = "kodamaya_use_count";

  let messages = [];
  let useCount = parseInt(localStorage.getItem(STORAGE_KEY) || "0", 10);

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");

  function init() {
    addBubble("ai",
      "こんにちは！弁護士アシスタントのi（アイ）です😊\n\n" +
      "法律のことって、なんだか難しそうで相談しにくいですよね。\n" +
      "でも大丈夫！どんな小さなことでも、気軽に聞いてみてください。"
    );
    if (useCount >= MAX_FREE) {
      showLimitBubble();
      disableInput();
    }
  }

  function addBubble(role, text) {
    const row = document.createElement("div");
    row.className = "bubble-row " + role;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    if (role === "ai") {
      const img = document.createElement("img");
      img.src = "ai-avatar.png";
      img.alt = "i（アイ）";
      avatar.appendChild(img);
    } else {
      avatar.textContent = "👤";
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble " + role;
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return bubble;
  }

  function showLimitBubble() {
    const row = document.createElement("div");
    row.className = "bubble-row ai";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    const img = document.createElement("img");
    img.src = "ai-avatar.png";
    img.alt = "i（アイ）";
    avatar.appendChild(img);

    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    bubble.innerHTML =
      "引き続きのご相談は、こだまや法律事務所へお気軽にどうぞ😊" +
      '<div class="contact-buttons">' +
        '<a class="contact-btn tel" href="tel:042-975-1000">📞 電話で相談する：042-975-1000</a>' +
        '<a class="contact-btn form" href="https://kodamaya-info.ssl-xserver.jp/script/mailform/file/" target="_blank" rel="noopener">✉️ お問合せフォームはこちら</a>' +
      "</div>";

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function disableInput() {
    inputEl.disabled = true;
    sendBtn.disabled = true;
    inputEl.placeholder = "ご相談はこだまや法律事務所へどうぞ";
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    if (useCount >= MAX_FREE) {
      showLimitBubble();
      disableInput();
      return;
    }

    addBubble("user", text);
    inputEl.value = "";
    autoResize();
    sendBtn.disabled = true;

    messages.push({ role: "user", content: text });

    const loadingBubble = addBubble("ai", "考え中...");

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages, system: SYSTEM_PROMPT })
      });

      if (!res.ok) throw new Error("HTTP " + res.status);

      const data = await res.json();
      const reply = data?.content?.[0]?.text || "回答を取得できませんでした。";

      loadingBubble.textContent = reply;
      messages.push({ role: "assistant", content: reply });

      useCount++;
      localStorage.setItem(STORAGE_KEY, String(useCount));

      if (useCount >= MAX_FREE) {
        disableInput();
        setTimeout(() => showLimitBubble(), 500);
      }
    } catch (e) {
      loadingBubble.textContent = "一時的にエラーが発生しました。少し待ってからもう一度お試しください。";
    } finally {
      if (useCount < MAX_FREE) sendBtn.disabled = false;
      scrollBottom();
    }
  }

  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  }

  sendBtn.addEventListener("click", sendMessage);
  inputEl.addEventListener("input", autoResize);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  init();
</script>
</body>
</html>
